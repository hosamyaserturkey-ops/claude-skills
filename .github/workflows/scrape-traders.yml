name: Scrape X Traders

on:
  workflow_dispatch:
    inputs:
      max_tweets:
        description: "Max tweets to fetch from Apify"
        required: true
        default: "100"
        type: string
      keywords:
        description: "Space-separated search keywords (leave empty for defaults)"
        required: false
        default: ""
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: x-trader-scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r x-trader-scraper/requirements.txt

      - name: Run scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          if [ -z "$APIFY_API_TOKEN" ]; then
            echo "::error::APIFY_API_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -n "${{ inputs.keywords }}" ]; then
            python3 x-trader-scraper/scrape.py \
              --max-tweets "${{ inputs.max_tweets }}" \
              --output traders.xlsx \
              --keywords ${{ inputs.keywords }}
          else
            python3 x-trader-scraper/scrape.py \
              --max-tweets "${{ inputs.max_tweets }}" \
              --output traders.xlsx
          fi

      - name: Upload traders.xlsx
        uses: actions/upload-artifact@v4
        with:
          name: traders-xlsx
          path: traders.xlsx
          if-no-files-found: error
          retention-days: 30
